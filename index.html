<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Feedbag" />
<meta name="theme-color" content="#211C17" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
<link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png" />
<link rel="apple-touch-icon" href="apple-touch-icon-180.png" />
<title>Feedbag - a table worth the trip</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink:#211C17; --ink-soft:#5A5147;
    --paper:#FAF7F1; --surface:#FFFFFF;
    --hair:#E5DDD0; --hair-strong:#D8CEBD;
    --michelin:#9E2B25; --bib:#7A4E7E; --beard:#B0873E; --ddd:#C25A2B; --pick:#3B6B52; --family:#4E6E8E; --resy:#275E64;
    --shadow:0 6px 24px rgba(33,28,23,.14); --shadow-lg:0 12px 40px rgba(33,28,23,.22);
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;height:100%;}
  body{font-family:"Hanken Grotesk",system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;overflow:hidden;}
  #map{position:absolute;inset:0;z-index:1;background:#EDE7DB;}
  .leaflet-control-attribution{font-family:inherit;font-size:10px;}

  header{position:absolute;top:0;left:0;right:0;z-index:600;padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;
    background:linear-gradient(180deg, rgba(250,247,241,.98) 0%, rgba(250,247,241,.92) 70%, rgba(250,247,241,0) 100%);pointer-events:none;}
  .bar{display:flex;align-items:center;gap:10px;pointer-events:auto;}
  .brand{display:flex;align-items:baseline;gap:8px;flex:1;min-width:0;}
  .brand h1{font-family:"Fraunces",serif;font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0;line-height:1;white-space:nowrap;}
  .brand .tag{font-size:11px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .iconbtn{pointer-events:auto;border:1px solid var(--hair-strong);background:var(--surface);color:var(--ink);width:40px;height:40px;border-radius:11px;display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow);flex:none;position:relative;}
  .iconbtn:active{transform:scale(.95);}
  .iconbtn svg{width:19px;height:19px;stroke:var(--ink);stroke-width:1.8;fill:none;}
  .syncdot{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;background:var(--pick);display:none;}
  .iconbtn.synced .syncdot{display:block;}

  .filters{display:flex;gap:7px;margin-top:10px;overflow-x:auto;pointer-events:auto;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{flex:none;border:1px solid var(--hair-strong);background:var(--surface);border-radius:999px;padding:7px 13px 7px 11px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--ink-soft);box-shadow:0 1px 3px rgba(33,28,23,.06);white-space:nowrap;font-family:inherit;}
  .chip .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .chip[aria-pressed="true"]{color:var(--ink);border-color:var(--ink);}
  .chip:active{transform:scale(.97);}

  .fabwrap{position:absolute;z-index:600;right:14px;bottom:calc(env(safe-area-inset-bottom) + 16px);display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
  .fab{border:none;border-radius:16px;cursor:pointer;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;font-family:inherit;}
  .fab-add{background:var(--ink);color:var(--paper);padding:14px 18px;font-size:15px;font-weight:600;}
  .fab-add svg{width:18px;height:18px;stroke:var(--paper);stroke-width:2.2;fill:none;}
  .fab-round{background:var(--surface);color:var(--ink);width:46px;height:46px;justify-content:center;border:1px solid var(--hair-strong);}
  .fab-round svg{width:20px;height:20px;stroke:var(--ink);stroke-width:1.9;fill:none;}
  .fab:active{transform:scale(.95);}

  .count-pill{position:absolute;z-index:600;left:14px;bottom:calc(env(safe-area-inset-bottom) + 18px);background:var(--surface);border:1px solid var(--hair-strong);border-radius:999px;padding:8px 14px;font-size:12px;font-weight:600;color:var(--ink-soft);box-shadow:var(--shadow);cursor:pointer;}
  .count-pill b{color:var(--ink);}

  .pin{width:26px;height:26px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);box-shadow:0 3px 8px rgba(33,28,23,.35);border:2.5px solid #fff;display:grid;place-items:center;}
  .pin .core{transform:rotate(-45deg);font-size:9px;line-height:1;color:#fff;font-weight:700;letter-spacing:-1px;}
  .pin .core:empty{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.92);}

  .scrim{position:absolute;inset:0;z-index:900;background:rgba(33,28,23,.32);opacity:0;pointer-events:none;transition:opacity .22s ease;}
  .scrim.on{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;z-index:1000;left:0;right:0;bottom:0;background:var(--surface);border-radius:22px 22px 0 0;box-shadow:0 -10px 40px rgba(33,28,23,.25);transform:translateY(105%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:88vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);}
  .sheet.on{transform:translateY(0);}
  .grab{width:38px;height:4px;border-radius:99px;background:var(--hair-strong);margin:10px auto 4px;flex:none;}
  .sheet-head{display:flex;align-items:center;gap:12px;padding:6px 18px 14px;border-bottom:1px solid var(--hair);}
  .sheet-head h2{font-family:"Fraunces",serif;font-weight:600;font-size:21px;margin:0;flex:1;letter-spacing:-.01em;}
  .sheet-body{overflow-y:auto;padding:16px 18px 22px;-webkit-overflow-scrolling:touch;}
  .closebtn{border:none;background:var(--paper);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:16px;color:var(--ink-soft);}

  label.fld{display:block;margin:0 0 15px;}
  label.fld > span, .fldlabel{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.02em;text-transform:uppercase;}
  input[type=text],textarea,select{width:100%;font-family:inherit;font-size:15px;color:var(--ink);border:1px solid var(--hair-strong);border-radius:11px;padding:12px 13px;background:var(--paper);}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--ink);outline-offset:1px;border-color:var(--ink);}
  textarea{resize:vertical;min-height:64px;line-height:1.45;}
  .addrrow{display:flex;gap:8px;} .addrrow input{flex:1;}
  .geobtn{flex:none;border:1px solid var(--ink);background:var(--ink);color:var(--paper);border-radius:11px;padding:0 15px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;}
  .geobtn:disabled{opacity:.5;}
  .geohint{font-size:12px;margin-top:6px;color:var(--ink-soft);min-height:16px;}
  .geohint.ok{color:var(--pick);} .geohint.err{color:var(--michelin);}

  .accgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .accopt{position:relative;display:flex;align-items:center;gap:9px;border:1px solid var(--hair-strong);border-radius:11px;padding:11px 12px;cursor:pointer;background:var(--paper);font-size:14px;font-weight:500;}
  .accopt .dot{width:11px;height:11px;border-radius:50%;flex:none;}
  .accopt input{position:absolute;opacity:0;pointer-events:none;}
  .accopt[data-on="true"]{border-color:var(--ink);background:var(--surface);box-shadow:inset 0 0 0 1px var(--ink);}

  .primary{width:100%;border:none;background:var(--ink);color:var(--paper);font-family:inherit;font-weight:600;font-size:16px;padding:15px;border-radius:13px;cursor:pointer;margin-top:4px;}
  .primary:active{transform:scale(.99);}
  .primary:disabled{opacity:.5;}
  .ghost{width:100%;border:1px solid var(--hair-strong);background:transparent;color:var(--ink-soft);font-family:inherit;font-weight:500;font-size:14px;padding:12px;border-radius:11px;cursor:pointer;margin-top:10px;}
  .danger{color:var(--michelin);border-color:transparent;}

  .accbadges{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 14px;}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;border-radius:999px;padding:5px 11px;color:#fff;}
  .detail-cuisine{font-size:14px;color:var(--ink-soft);margin:0 0 14px;}
  .detail-note{font-size:15px;line-height:1.55;color:var(--ink);white-space:pre-wrap;margin:0 0 18px;}
  .detail-addr{font-size:13px;color:var(--ink-soft);line-height:1.4;margin:0 0 6px;display:flex;gap:8px;align-items:flex-start;}
  .detail-addr svg{width:15px;height:15px;stroke:var(--ink-soft);stroke-width:1.7;fill:none;flex:none;margin-top:2px;}
  .verifyrow{font-size:12px;color:var(--beard);margin:0 0 16px;font-weight:500;}
  .row2{display:flex;gap:10px;} .row2 button{flex:1;}
  .maplink{display:block;text-align:center;text-decoration:none;color:var(--ink);border:1px solid var(--hair-strong);border-radius:11px;padding:12px;font-weight:600;font-size:14px;margin-top:10px;}

  .ratings{border-top:1px solid var(--hair);margin-top:18px;padding-top:16px;}
  .rating-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
  .rating-who{font-weight:600;font-size:13px;min-width:64px;padding-top:2px;}
  .rating-stars{color:var(--beard);font-size:15px;letter-spacing:2px;}
  .rating-take{font-size:14px;color:var(--ink);line-height:1.45;margin-top:3px;}
  .starpick{display:flex;gap:6px;margin:6px 0 10px;}
  .starpick button{border:none;background:none;font-size:26px;cursor:pointer;color:var(--hair-strong);padding:2px;}
  .starpick button.on{color:var(--beard);}

  .listitem{display:flex;gap:12px;padding:13px 2px;border-bottom:1px solid var(--hair);cursor:pointer;align-items:flex-start;}
  .listitem:last-child{border-bottom:none;}
  .li-ring{width:14px;height:14px;border-radius:50%;flex:none;margin-top:3px;}
  .li-main{flex:1;min-width:0;}
  .li-name{font-family:"Fraunces",serif;font-weight:600;font-size:16px;margin:0 0 2px;}
  .li-meta{font-size:12px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .li-dist{font-size:12px;font-weight:600;color:var(--ink);flex:none;padding-top:3px;}
  .empty{text-align:center;padding:36px 20px;color:var(--ink-soft);}
  .empty h3{font-family:"Fraunces",serif;font-weight:500;color:var(--ink);font-size:19px;margin:0 0 8px;}
  .empty p{font-size:14px;line-height:1.5;margin:0;}
  .seednote{background:var(--paper);border:1px solid var(--hair);border-radius:11px;padding:12px 13px;font-size:12.5px;line-height:1.5;color:var(--ink-soft);margin-top:14px;}
  .seednote b{color:var(--ink);}
  .livestatus{font-size:13px;color:var(--ink-soft);margin-top:10px;min-height:18px;}

  .guide h3{font-family:"Fraunces",serif;font-weight:600;font-size:17px;margin:22px 0 8px;}
  .guide h3:first-child{margin-top:0;}
  .guide p, .guide li{font-size:14px;line-height:1.55;color:var(--ink);}
  .guide ol{padding-left:20px;margin:6px 0 12px;}
  .guide li{margin-bottom:7px;}
  .guide code{background:var(--paper);border:1px solid var(--hair);border-radius:5px;padding:1px 5px;font-size:12.5px;}

  .menusec{border-top:1px solid var(--hair);margin-top:18px;padding-top:16px;}
  .menusec:first-child{border-top:none;margin-top:0;padding-top:0;}

  .welcome-logo{font-family:"Fraunces",serif;font-weight:600;font-size:34px;text-align:center;margin:8px 0 2px;}
  .welcome-sub{text-align:center;color:var(--ink-soft);font-size:14px;margin:0 0 20px;}

  @media (prefers-reduced-motion:reduce){.sheet,.scrim{transition:none;}}
</style>
</head>
<body>

<div id="map"></div>

<header>
  <div class="bar">
    <div class="brand"><h1>Feedbag</h1><span class="tag">a table worth the trip</span></div>
    <button class="iconbtn" id="btn-search" aria-label="Search places"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg></button>
    <button class="iconbtn" id="btn-menu" aria-label="Settings and data"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg><span class="syncdot"></span></button>
  </div>
  <div class="filters" id="filters"></div>
</header>

<div class="count-pill" id="count-pill" role="button" tabindex="0"><b id="count-n">0</b> places</div>

<div class="fabwrap">
  <button class="fab fab-round" id="btn-locate" aria-label="Center on my location"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></button>
  <button class="fab fab-add" id="btn-add"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Add a place</button>
</div>

<div class="scrim" id="scrim"></div>
<section class="sheet" id="sheet" aria-modal="true" role="dialog">
  <div class="grab"></div>
  <div class="sheet-head"><h2 id="sheet-title">Feedbag</h2><button class="closebtn" id="btn-close" aria-label="Close">✕</button></div>
  <div class="sheet-body" id="sheet-body"></div>
</section>

let PLACES=loadLocal();

let activeFilters=new Set(), searchTerm="", editingId=null, pendingLatLng=null;
let userLoc=null;
const markers={};

/* ---------- MAP ---------- */
const map=L.map("map",{zoomControl:false}).setView([45,-30],3);
L.control.zoom({position:"topright"}).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{attribution:"© OpenStreetMap © CARTO",maxZoom:19}).addTo(map);

/* ---------- SEEDS ---------- */
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}
function expandSeed(r){
  const [n,c,la,lo,ci,acc,f,no]=r;
  const codes=(acc||"").split(",").map(s=>s.trim()).filter(Boolean);
  const accolades=[]; let stars=0;
  codes.forEach(cd=>{
    if(/^M[123]$/.test(cd)){ accolades.push("michelin"); stars=+cd[1]; }
    else if(cd==="BIB") accolades.push("bib");
    else if(cd==="JB") accolades.push("beard");
    else if(cd==="DDD") accolades.push("ddd");
    else if(cd==="PICK") accolades.push("pick");
  });
  return {id:"s-"+slug(n),name:n,cuisine:c,lat:la,lng:lo,address:ci,accolades,stars,fam:!!f,resy:false,note:no||"",v:false,archived:false};
}

/* ---------- VISIBILITY ---------- */
function visiblePlaces(){
  return PLACES.filter(p=>{
    if(p.archived) return false;
    if(activeFilters.size){
      let ok=false;
      for(const f of activeFilters){
        if(f==="family"){ if(p.fam) ok=true; }
        else if(f==="resy"){ if(p.resy) ok=true; }
        else if((p.accolades||[]).includes(f)) ok=true;
      }
      if(!ok) return false;
    }
    if(searchTerm){
      const hay=`${p.name} ${p.cuisine||""} ${p.address||""} ${p.note||""}`.toLowerCase();
      if(!hay.includes(searchTerm)) return false;
    }
    return true;
  });
}

/* ---------- DISTANCE ---------- */
function distMi(lat1,lon1,lat2,lon2){
  const R=3958.8, toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1), dLon=toR(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(mi){ return mi<10?mi.toFixed(1)+" mi":Math.round(mi)+" mi"; }

/* ---------- MARKERS ---------- */
function pinColor(p){
  const a=p.accolades||[];
  if(a.includes("michelin")) return ACC.michelin.color;
  if(a.includes("bib")) return ACC.bib.color;
  if(a.includes("beard")) return ACC.beard.color;
  if(a.includes("ddd")) return ACC.ddd.color;
  if(a.includes("pick")) return ACC.pick.color;
  return "#8A8072";
}
function markerIcon(p){
  const core=(p.accolades||[]).includes("michelin")&&p.stars?("★".repeat(Math.min(p.stars,3))):"";
  return L.divIcon({className:"",iconSize:[26,26],iconAnchor:[13,25],
    html:`<div class="pin" style="background:${pinColor(p)}"><div class="core">${core}</div></div>`});
}
function renderMarkers(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  for(const k in markers) delete markers[k];
  const vis=visiblePlaces();
  vis.forEach(p=>{
    if(typeof p.lat!=="number"||typeof p.lng!=="number")return;
    const m=L.marker([p.lat,p.lng],{icon:markerIcon(p)}).addTo(map);
    m.on("click",()=>openDetail(p.id));
    markers[p.id]=m;
  });
  document.getElementById("count-n").textContent=vis.length;
}

/* ---------- FILTER CHIPS ---------- */
function renderFilters(){
  const wrap=document.getElementById("filters"); wrap.innerHTML="";
  const defs=[...Object.entries(ACC),
    ["family",{label:"Family-friendly",color:FAM_COLOR}],
    ["resy",{label:"On Resy",color:RESY_COLOR}]];
  defs.forEach(([key,a])=>{
    const b=document.createElement("button");
    b.className="chip"; b.setAttribute("aria-pressed",activeFilters.has(key));
    b.innerHTML=`<span class="dot" style="background:${a.color}"></span>${a.label}`;
    b.onclick=()=>{activeFilters.has(key)?activeFilters.delete(key):activeFilters.add(key);renderFilters();renderMarkers();};
    wrap.appendChild(b);
  });
}

/* ---------- FORM ---------- */
function openForm(place){
  editingId=place?place.id:null;
  pendingLatLng=place?{lat:place.lat,lng:place.lng}:null;
  const p=place||{name:"",cuisine:"",address:"",accolades:[],stars:0,fam:false,resy:false,note:""};
  const opts=[...Object.entries(ACC),
    ["family",{label:"Family-friendly",color:FAM_COLOR}],
    ["resy",{label:"On Resy",color:RESY_COLOR}]];
  const isOn=k=>k==="family"?p.fam:k==="resy"?p.resy:(p.accolades||[]).includes(k);
  const accHTML=opts.map(([k,a])=>`
    <label class="accopt" data-acc="${k}" data-on="${isOn(k)}">
      <input type="checkbox" ${isOn(k)?"checked":""}/>
      <span class="dot" style="background:${a.color}"></span>${a.label}
    </label>`).join("");
  document.getElementById("sheet-body").innerHTML=`
    <label class="fld"><span>Restaurant</span><input type="text" id="f-name" value="${esc(p.name)}" placeholder="e.g. Cochon"/></label>
    <label class="fld"><span>Address / city</span>
      <div class="addrrow"><input type="text" id="f-addr" value="${esc(p.address)}" placeholder="Street, city, country"/><button class="geobtn" id="f-geo">Find</button></div>
      <div class="geohint" id="f-geohint">${place?"Saved location kept unless you re-find.":"Type an address, then Find to drop the pin."}</div>
    </label>
    <label class="fld"><span>Cuisine</span><input type="text" id="f-cuisine" value="${esc(p.cuisine)}" placeholder="e.g. Cajun, Sushi, Cheesesteak"/></label>
    <div class="fld"><span class="fldlabel">Lenses</span><div class="accgrid" id="f-acc">${accHTML}</div></div>
    <label class="fld" id="f-starswrap" style="${(p.accolades||[]).includes("michelin")?"":"display:none"}"><span>Michelin stars</span>
      <select id="f-stars"><option value="1"${p.stars===1?" selected":""}>★</option><option value="2"${p.stars===2?" selected":""}>★★</option><option value="3"${p.stars===3?" selected":""}>★★★</option></select>
    </label>
    <label class="fld"><span>Shared note</span><textarea id="f-note" placeholder="Why it's worth it. What to order.">${esc(p.note)}</textarea></label>
    <button class="primary" id="f-save">${place?"Save changes":"Add to map"}</button>
    ${place?`<button class="ghost danger" id="f-del">Remove from map</button>`:""}`;
  openSheet(place?"Edit place":"Add a place");
  document.querySelectorAll("#f-acc .accopt").forEach(el=>{
    el.onclick=e=>{
      if(e.target.tagName!=="INPUT"){const cb=el.querySelector("input");cb.checked=!cb.checked;}
      el.dataset.on=el.querySelector("input").checked;
      if(el.dataset.acc==="michelin") document.getElementById("f-starswrap").style.display=el.querySelector("input").checked?"":"none";
    };
  });
  document.getElementById("f-geo").onclick=geocode;
  document.getElementById("f-save").onclick=saveForm;
  if(place)document.getElementById("f-del").onclick=()=>archivePlace(place.id);
}

async function geocode(){
  const addr=document.getElementById("f-addr").value.trim();
  const hint=document.getElementById("f-geohint"),btn=document.getElementById("f-geo");
  if(!addr){hint.className="geohint err";hint.textContent="Enter an address first.";return;}
  hint.className="geohint";hint.textContent="Looking up…";btn.disabled=true;
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(addr)}`,{headers:{Accept:"application/json"}});
    const j=await r.json();
    if(j&&j.length){
      pendingLatLng={lat:+j[0].lat,lng:+j[0].lon};
      hint.className="geohint ok";hint.textContent="Pin located ✓ "+(j[0].display_name||"").split(",").slice(0,3).join(", ");
      map.setView([pendingLatLng.lat,pendingLatLng.lng],14);
    }else{hint.className="geohint err";hint.textContent="No match. Try adding city + country.";}
  }catch(e){hint.className="geohint err";hint.textContent="Lookup failed (check connection).";}
  finally{btn.disabled=false;}
}

function saveForm(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){document.getElementById("f-name").focus();return;}
  if(!pendingLatLng){
    const h=document.getElementById("f-geohint");h.className="geohint err";h.textContent="Find the address to place the pin first.";return;
  }
  const accolades=[];let fam=false,resy=false;
  document.querySelectorAll("#f-acc .accopt").forEach(el=>{
    if(el.querySelector("input").checked){
      if(el.dataset.acc==="family")fam=true;
      else if(el.dataset.acc==="resy")resy=true;
      else accolades.push(el.dataset.acc);
    }
  });
  const prev=editingId?PLACES.find(p=>p.id===editingId):null;
  const rec={
    id:editingId||uid(),name,
    cuisine:document.getElementById("f-cuisine").value.trim(),
    address:document.getElementById("f-addr").value.trim(),
    note:document.getElementById("f-note").value.trim(),
    accolades,
    stars:accolades.includes("michelin")?+document.getElementById("f-stars").value:0,
    fam,resy,
    lat:pendingLatLng.lat,lng:pendingLatLng.lng,
    v:true,archived:(prev&&prev.archived)||false
  };
  if(editingId)PLACES=PLACES.map(p=>p.id===editingId?rec:p);
  else PLACES.push(rec);
  persistLocal();cloudUpsert([rec]);
  renderMarkers();closeSheet();
  map.setView([rec.lat,rec.lng],13);
}

function archivePlace(id){
  const p=PLACES.find(x=>x.id===id);if(!p)return;
  p.archived=true;
  persistLocal();cloudUpsert([p]);
  renderMarkers();closeSheet();
}

/* ---------- DETAIL + FEEDBAG (ratings) ---------- */
function badgeFor(p,a){
  if(a==="michelin")return `<span class="badge" style="background:${ACC.michelin.color}">Michelin ${"★".repeat(p.stars||1)}</span>`;
  return `<span class="badge" style="background:${ACC[a].color}">${ACC[a].label}</span>`;
}
function ratingsHTML(p){
  const r=RATINGS[p.id]||{};
  const rows=Object.entries(r).map(([who,val])=>`
    <div class="rating-row">
      <span class="rating-who">${esc(who)}</span>
      <div><span class="rating-stars">${"★".repeat(val.score||0)}${"☆".repeat(Math.max(0,5-(val.score||0)))}</span>
      ${val.take?`<p class="rating-take">${esc(val.take)}</p>`:""}</div>
    </div>`).join("");
  const mine=PROFILE&&r[PROFILE]?r[PROFILE]:{score:0,take:""};
  return `<div class="ratings">
    <span class="fldlabel">The feedbag</span>
    ${rows||`<p class="geohint">No takes yet - be the first to give it feedbag.</p>`}
    ${PROFILE?`
      <span class="fldlabel" style="margin-top:12px;">Give it feedbag, ${esc(PROFILE)}</span>
      <div class="starpick" id="r-stars">${[1,2,3,4,5].map(n=>`<button data-n="${n}" class="${mine.score>=n?"on":""}" aria-label="${n} star${n>1?"s":""}">★</button>`).join("")}</div>
      <textarea id="r-take" placeholder="Your take - worth the trip?">${esc(mine.take||"")}</textarea>
      <button class="ghost" id="r-save">Save my take</button>`
    :`<p class="geohint">Set your name (☰ → Profile) to rate places.</p>`}
  </div>`;
}
function openDetail(id){
  const p=PLACES.find(x=>x.id===id);if(!p)return;
  const badges=(p.accolades||[]).filter(a=>ACC[a]).map(a=>badgeFor(p,a)).join("")
    +(p.fam?`<span class="badge" style="background:${FAM_COLOR}">Family-friendly</span>`:"")
    +(p.resy?`<span class="badge" style="background:${RESY_COLOR}">On Resy</span>`:"");
  const gmaps=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name+" "+(p.address||""))}`;
  const dist=userLoc?fmtDist(distMi(userLoc.lat,userLoc.lng,p.lat,p.lng))+" away":"";
  document.getElementById("sheet-body").innerHTML=`
    ${badges?`<div class="accbadges">${badges}</div>`:""}
    ${p.cuisine?`<p class="detail-cuisine">${esc(p.cuisine)}${dist?" · "+dist:""}</p>`:dist?`<p class="detail-cuisine">${dist}</p>`:""}
    ${p.note?`<p class="detail-note">${esc(p.note)}</p>`:""}
    ${p.address?`<p class="detail-addr"><svg viewBox="0 0 24 24"><path d="M12 21s7-6.3 7-11a7 7 0 10-14 0c0 4.7 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>${esc(p.address)}</p>`:""}
    ${p.v?"":`<p class="verifyrow">Unverified - double-check hours, status, and exact location before you go.</p>`}
    <a class="maplink" href="${gmaps}" target="_blank" rel="noopener">Open in Maps ↗</a>
    ${p.v?"":`<button class="ghost" id="d-verify">Mark as verified</button>`}
    ${ratingsHTML(p)}
    <div class="row2" style="margin-top:16px;">
      <button class="ghost" id="d-edit">Edit</button>
      <button class="ghost danger" id="d-del">Remove</button>
    </div>`;
  openSheet(p.name);
  document.getElementById("d-edit").onclick=()=>openForm(p);
  document.getElementById("d-del").onclick=()=>archivePlace(p.id);
  const vb=document.getElementById("d-verify");
  if(vb)vb.onclick=()=>{p.v=true;persistLocal();cloudUpsert([p]);openDetail(p.id);};
  if(PROFILE){
    const mine=(RATINGS[p.id]&&RATINGS[p.id][PROFILE])||{score:0};
    let picked=mine.score||0;
    const starBtns=document.querySelectorAll("#r-stars button");
    starBtns.forEach(b=>{
      b.onclick=()=>{
        picked=+b.dataset.n;
        starBtns.forEach(x=>x.classList.toggle("on",+x.dataset.n<=picked));
      };
    });
    document.getElementById("r-save").onclick=async()=>{
      const take=document.getElementById("r-take").value.trim();
      RATINGS[p.id]=RATINGS[p.id]||{};
      RATINGS[p.id][PROFILE]={score:picked,take};
      await ratingUpsert(p.id,PROFILE,picked,take);
      openDetail(p.id);
    };
  }
}

/* ---------- LIST (Near Me aware) ---------- */
function ringFor(p){return pinColor(p);}
function metaFor(p){
  const parts=[p.cuisine];
  (p.accolades||[]).forEach(a=>{
    if(a==="michelin")parts.push("Michelin "+"★".repeat(p.stars||1));
    else if(ACC[a])parts.push(ACC[a].label);
  });
  if(p.fam)parts.push("Family");
  if(p.resy)parts.push("Resy");
  const r=RATINGS[p.id]||{};
  const scores=Object.values(r).map(x=>x.score).filter(Boolean);
  if(scores.length)parts.push((scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1)+"★ us");
  return parts.filter(Boolean).join(" · ");
}
function openList(){
  let vis=visiblePlaces().slice();
  let title;
  if(userLoc){
    vis.sort((a,b)=>distMi(userLoc.lat,userLoc.lng,a.lat,a.lng)-distMi(userLoc.lat,userLoc.lng,b.lat,b.lng));
    title="Near you";
  }else{
    vis.sort((a,b)=>a.name.localeCompare(b.name));
    title=`${vis.length} place${vis.length===1?"":"s"}`;
  }
  let html;
  if(!vis.length){html=`<div class="empty"><h3>Nothing here yet</h3><p>Add a place, or clear filters to see everything.</p></div>`;}
  else{html=vis.slice(0,100).map(p=>`<div class="listitem" data-id="${p.id}">
      <span class="li-ring" style="background:${ringFor(p)}"></span>
      <div class="li-main"><p class="li-name">${esc(p.name)}</p><p class="li-meta">${esc(metaFor(p))||"&nbsp;"}</p></div>
      ${userLoc?`<span class="li-dist">${fmtDist(distMi(userLoc.lat,userLoc.lng,p.lat,p.lng))}</span>`:""}
    </div>`).join("");}
  document.getElementById("sheet-body").innerHTML=html;
  openSheet(title);
  document.querySelectorAll(".listitem").forEach(el=>{
    el.onclick=()=>{const p=PLACES.find(x=>x.id===el.dataset.id);map.setView([p.lat,p.lng],13);openDetail(p.id);};
  });
}

function mergeSeeds(){

  SEED.forEach(r=>{if(!have.has(r[0].toLowerCase())){PLACES.push(expandSeed(r));n++;}});
  return n;
}

/* ---------- SUPABASE SYNC ----------
   places(id text pk, data jsonb) + ratings(place_id, person, score, take).
   Pull-merge on open/sync; targeted upserts on change; archive not delete. */
function cloudHeaders(){return {apikey:CLOUD.key,Authorization:"Bearer "+CLOUD.key,"Content-Type":"application/json"};}
async function cloudPullMerge(){
  try{
    const r=await fetch(CLOUD.url+"/rest/v1/places?select=id,data",{headers:cloudHeaders()});
    if(!r.ok)return false;
    const rows=await r.json();
    const remote=new Map(rows.map(x=>[x.id,x.data]));
    const remoteNames=new Set([...remote.values()].map(d=>(d.name||"").toLowerCase()));
    const localOnly=PLACES.filter(p=>!remote.has(p.id)&&!remoteNames.has(p.name.toLowerCase()));
    // migrate any embedded v3 ratings before dropping local copies
    const legacy=[];
    PLACES.forEach(p=>{
      if(p.ratings&&Object.keys(p.ratings).length){
        Object.entries(p.ratings).forEach(([person,val])=>legacy.push({place_id:p.id,person,score:val.score||0,take:val.take||""}));
        delete p.ratings;
      }
    });
    PLACES=[...remote.values(),...localOnly].map(p=>({archived:false,resy:false,...p}));
    persistLocal();
    if(localOnly.length)cloudUpsert(localOnly);
    if(legacy.length)ratingBulkUpsert(legacy);
    await ratingsPull();
    return true;
  }catch(e){return false;}
}
async function ratingsPull(){
  try{
    const r=await fetch(CLOUD.url+"/rest/v1/ratings?select=place_id,person,score,take",{headers:cloudHeaders()});
    if(!r.ok)return false;
    const rows=await r.json();
    RATINGS={};
    rows.forEach(x=>{
      RATINGS[x.place_id]=RATINGS[x.place_id]||{};
      RATINGS[x.place_id][x.person]={score:x.score||0,take:x.take||""};
    });
    return true;
  }catch(e){return false;}
}
async function cloudUpsert(recs){
  if(!recs||!recs.length)return false;
  try{
    const body=JSON.stringify(recs.map(p=>({id:p.id,data:p,updated_at:new Date().toISOString()})));
    const r=await fetch(CLOUD.url+"/rest/v1/places",{method:"POST",
      headers:{...cloudHeaders(),Prefer:"resolution=merge-duplicates"},body});
    return r.ok;
  }catch(e){return false;}
}
async function ratingUpsert(place_id,person,score,take){
  try{
    const r=await fetch(CLOUD.url+"/rest/v1/ratings",{method:"POST",
      headers:{...cloudHeaders(),Prefer:"resolution=merge-duplicates"},
      body:JSON.stringify([{place_id,person,score,take,updated_at:new Date().toISOString()}])});
    return r.ok;
  }catch(e){return false;}
}
async function ratingBulkUpsert(rows){
  try{
    const r=await fetch(CLOUD.url+"/rest/v1/ratings",{method:"POST",
      headers:{...cloudHeaders(),Prefer:"resolution=merge-duplicates"},
      body:JSON.stringify(rows)});
    return r.ok;
  }catch(e){return false;}
}
function syncBadge(on){document.getElementById("btn-menu").classList.toggle("synced",!!on);}

/* ---------- NAME CLAIMS (one person per name) ----------
   First device to claim a name stores a secret token in the
   profiles table. Same name + different device = rejected.
   Honest limit: this prevents collisions and casual admin
   impersonation, not a determined attacker with dev tools. */
let CLAIM_OK=false;
function fbCode(){
  let t=localStorage.getItem("feedbag-token");
  if(!t){t=genCode();localStorage.setItem("feedbag-token",t);}
  return t;
}
function setFbCode(c){localStorage.setItem("feedbag-token",c);}
function genCode(){
  const A="ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  return Array.from({length:6},()=>A[Math.floor(Math.random()*A.length)]).join("");
}
async function rpc(fn,body){
  try{
    const r=await fetch(CLOUD.url+"/rest/v1/rpc/"+fn,{method:"POST",headers:cloudHeaders(),body:JSON.stringify(body)});
    if(!r.ok)return null;
    return await r.json();
  }catch(e){return null;}
}
/* verify-only: never inserts. Used on startup. */
async function checkClaim(name){
  const res=await rpc("feedbag_check",{p_name:name,p_code:fbCode()});
  CLAIM_OK=(res==="ok");
  return res;
}
/* deliberate claim: fresh names get a brand-new code; taken names prompt for one. */
async function claimFlow(name){
  let st=await rpc("feedbag_check",{p_name:name,p_code:fbCode()});
  if(st==="ok"){CLAIM_OK=true;return {ok:true};}
  if(st==="free"){
    const code=genCode();setFbCode(code);
    const r=await rpc("feedbag_claim",{p_name:name,p_code:code});
    if(r==="claimed"||r==="ok"){CLAIM_OK=true;return {ok:true,fresh:true,code:code};}
    st=(r==="taken")?"taken":st;
  }
  if(st==="taken"){
    const c=prompt('"'+name+'" is already claimed.\n\nIf that is you on another device, enter your Feedbag code:');
    if(c&&c.trim()){
      const r=await rpc("feedbag_claim",{p_name:name,p_code:c.trim().toUpperCase()});
      if(r==="ok"){CLAIM_OK=true;setFbCode(c.trim().toUpperCase());return {ok:true};}
      alert("That code did not match. Pick a different name (add a last initial), or ask Ryan to free this one.");
    }
    return {ok:false,reason:"taken"};
  }
  return {ok:false,reason:"offline"};
}

/* ---------- WIKIDATA ---------- */
async function wikidataPull(){
  const st=document.getElementById("m-status");
  if(st)st.textContent="Finding Michelin award entities on Wikidata…";
  try{
    const sr=await fetch("https://www.wikidata.org/w/api.php?action=wbsearchentities&search=Michelin%20star&language=en&type=item&limit=20&format=json&origin=*");
    const sj=await sr.json();
    const qids=(sj.search||[])
      .filter(e=>/michelin star/i.test(e.label||"")||/michelin star/i.test(e.description||""))
      .map(e=>e.id).slice(0,8);
    if(!qids.length){if(st)st.textContent="Couldn't locate Michelin award entities - Wikidata's modeling may have changed.";return;}
    if(st)st.textContent="Querying starred restaurants (can take ~20s)…";
    const sparql=`SELECT ?item ?itemLabel ?coord ?awardLabel ?countryLabel WHERE {
      VALUES ?award { ${qids.map(q=>"wd:"+q).join(" ")} }
      ?item p:P166 ?aw . ?aw ps:P166 ?award .
      ?item wdt:P625 ?coord .
      SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
    } LIMIT 4000`;
    const qr=await fetch("https://query.wikidata.org/sparql?format=json&query="+encodeURIComponent(sparql),{headers:{Accept:"application/sparql-results+json"}});
    const qj=await qr.json();
    const rows=(qj.results&&qj.results.bindings)||[];
    if(!rows.length){if(st)st.textContent="Query returned nothing - try again later.";return;}
    const have=new Set(PLACES.map(p=>p.name.toLowerCase()));
    const added=[];
    rows.forEach(b=>{
      const name=b.itemLabel&&b.itemLabel.value;if(!name||have.has(name.toLowerCase()))return;
      const m=/Point\(([-\d.]+) ([-\d.]+)\)/.exec(b.coord.value||"");if(!m)return;
      const award=(b.awardLabel&&b.awardLabel.value||"").toLowerCase();
      let stars=1;
      if(/(three|3)/.test(award))stars=3;else if(/(two|2)/.test(award))stars=2;
      const rec={id:uid(),name,cuisine:"",address:(b.countryLabel&&b.countryLabel.value)||"",
        accolades:["michelin"],stars,fam:false,resy:false,lat:+m[2],lng:+m[1],
        note:"Imported from Wikidata ("+(b.awardLabel?b.awardLabel.value:"Michelin")+"). Star data may be historical - verify.",v:false,archived:false};
      PLACES.push(rec);have.add(name.toLowerCase());added.push(rec);
    });
    persistLocal();if(added.length)cloudUpsert(added);
    renderMarkers();
    if(st)st.textContent=added.length?`Added ${added.length} places from Wikidata. All marked unverified.`:"No new places - everything found was already in the feedbag.";
  }catch(e){
    if(st)st.textContent="Wikidata pull failed (connection or service busy). Try again in a minute.";
  }
}

/* ---------- BACKUP / PACKS ---------- */
function exportData(){
  const payload={places:PLACES,ratings:RATINGS,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`feedbag-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(url);
}
function importData(e,mode){
  const file=e.target.files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const raw=JSON.parse(rd.result);
      const arr=Array.isArray(raw)?raw:(raw.places||[]);
      if(!Array.isArray(arr))throw 0;
      const clean=arr.filter(p=>p&&p.name&&typeof p.lat==="number"&&typeof p.lng==="number")
        .map(p=>({id:p.id||uid(),name:p.name,cuisine:p.cuisine||"",address:p.address||"",note:p.note||"",
          accolades:Array.isArray(p.accolades)?p.accolades:[],stars:p.stars||0,fam:!!p.fam,resy:!!p.resy,
          lat:p.lat,lng:p.lng,v:!!p.v,archived:!!p.archived}));
      if(mode==="merge"){
        const have=new Set(PLACES.map(p=>p.name.toLowerCase()));
        const fresh=clean.filter(p=>!have.has(p.name.toLowerCase()));
        if(confirm(`Merge ${fresh.length} new place${fresh.length===1?"":"s"} into the shared feedbag?`)){
          PLACES.push(...fresh);persistLocal();cloudUpsert(fresh);renderMarkers();closeSheet();
        }
      }else{
        if(confirm(`REPLACE this device's data with ${clean.length} places from the backup, and push to the shared feedbag?`)){
          PLACES=clean;persistLocal();cloudUpsert(PLACES);renderMarkers();closeSheet();
        }
      }
    }catch(err){alert("That file didn't look like a Feedbag backup or pack.");}
  };
  rd.readAsText(file);
  e.target.value="";
}

/* ---------- LOCATE + WIRING ---------- */
function tryLocate(fly){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    userLoc={lat:pos.coords.latitude,lng:pos.coords.longitude};
    if(fly)map.setView([userLoc.lat,userLoc.lng],11);
  },()=>{},{enableHighAccuracy:false,timeout:8000,maximumAge:300000});
}
document.getElementById("btn-locate").onclick=()=>tryLocate(true);
document.getElementById("btn-add").onclick=()=>openForm(null);
document.getElementById("btn-menu").onclick=openMenu;
document.getElementById("btn-search").onclick=openSearch;
document.getElementById("count-pill").onclick=openList;
document.getElementById("count-pill").onkeydown=e=>{if(e.key==="Enter")openList();};

/* ---------- STORAGE ---------- */
function loadLocal(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){const d=JSON.parse(raw);if(Array.isArray(d))return d.map(p=>({archived:false,resy:false,...p}));}
  }catch(e){}
  return SEED.map(expandSeed);
}
function persistLocal(){try{localStorage.setItem(KEY,JSON.stringify(PLACES));}catch(e){}}

/* ---------- UTIL ---------- */
function uid(){return "p"+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3);}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- GO ---------- */
renderFilters();
renderMarkers();
syncBadge(true);
tryLocate(false);
cloudPullMerge().then(ok=>{syncBadge(ok);renderMarkers();});
if(!PROFILE){setTimeout(openWelcome,600);}else{checkClaim(PROFILE);}
</script>
